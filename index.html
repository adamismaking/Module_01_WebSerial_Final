<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSerial Pro DJ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="container">
        <header>
            <h1>WEBSERIAL DJ</h1>
            <button id="connectSerial">CONNECT DEVICE</button>
        </header>

        <section class="visualizer">
            <canvas id="viz"></canvas>
            <div id="deck-status">ACTIVE DECK: A</div>
        </section>

        <div class="mixer-section">
            <div class="xfade-row">
                <span>A</span>
                <input type="range" id="crossfader" min="0" max="100" value="50">
                <span>B</span>
            </div>
        </div>

        <main class="grid">
            <div class="deck" id="deck-a">
                <h2>TRACK A</h2>
                <div class="tracklist" id="listA"></div>
                <div class="fx">
                    <div class="ctl"><label>PITCH</label><input type="range" id="pitchA" min="0.5" max="2" step="0.01" value="1"></div>
                    <div class="ctl"><label>VOLUME</label><input type="range" id="volumeA" min="0" max="1" step="0.01" value="0.8"></div>
                    <div class="ctl"><label>BASS</label><input type="range" id="bassA" min="-20" max="20" step="1" value="0"></div>
                    <div class="ctl"><label>REVERB</label><input type="range" id="reverbA" min="0" max="1" step="0.01" value="0"></div>
                </div>
            </div>

            <div class="deck" id="deck-b">
                <h2>TRACK B</h2>
                <div class="tracklist" id="listB"></div>
                <div class="fx">
                    <div class="ctl"><label>PITCH</label><input type="range" id="pitchB" min="0.5" max="2" step="0.01" value="1"></div>
                    <div class="ctl"><label>VOLUME</label><input type="range" id="volumeB" min="0" max="1" step="0.01" value="0.8"></div>
                    <div class="ctl"><label>BASS</label><input type="range" id="bassB" min="-20" max="20" step="1" value="0"></div>
                    <div class="ctl"><label>REVERB</label><input type="range" id="reverbB" min="0" max="1" step="0.01" value="0"></div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
